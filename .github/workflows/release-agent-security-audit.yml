name: Release Agent — security-audit

on:
  push:
    branches:
      - main
    paths:
      - "packages/agents/security-audit/**"
      - ".github/workflows/release-agent-security-audit.yml"
      - "!packages/agents/security-audit/**/*.md"
      - "!packages/agents/security-audit/**/*.test.*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Exclude GitLab submodule from workspace
        run: |
          if [ ! -f packages/core-gitlab/package.json ]; then
            sed -i '/core-gitlab/d' pnpm-workspace.yaml
          fi

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Core (workspace dependency)
        run: cd packages/core && pnpm build

      - name: Build Agent
        run: cd packages/agents/security-audit && pnpm build

      - name: Run Agent Tests
        run: cd packages/agents/security-audit && pnpm test

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd packages/agents/security-audit && npx semantic-release
